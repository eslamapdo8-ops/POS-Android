name: Build APK & Emulator Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + Install on Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Analyze APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/*.apk | head -1)
          echo "=== APK: $APK_PATH ==="
          ls -lh "$APK_PATH"
          echo ""
          echo "=== aapt dump badging ==="
          $ANDROID_HOME/build-tools/34.0.0/aapt dump badging "$APK_PATH" 2>&1 || true
          echo ""
          echo "=== Native libs (ABI) ==="
          unzip -l "$APK_PATH" 2>/dev/null | grep "lib/" || echo "Pure Java/Kotlin APK"

      - name: Verify APK signature
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/*.apk | head -1)
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK_PATH" 2>&1 || echo "Signature check done"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Emulator + Install Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 26
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell input keyevent 82
            adb shell 'while [[ "$(getprop sys.boot_completed)" != "1" ]]; do sleep 1; done'
            sleep 5

            echo "=== Device info ==="
            adb shell getprop ro.product.cpu.abi
            adb shell getprop ro.build.version.sdk
            adb shell wm size

            echo "=== Installing APK ==="
            APK_PATH=$(find app/build/outputs/apk/release/*.apk | head -1)
            echo "Installing: $APK_PATH"
            adb install -t -r "$APK_PATH"
            INSTALL_EXIT=$?

            if [ $INSTALL_EXIT -ne 0 ]; then
              echo "::error::INSTALLATION FAILED with exit code: $INSTALL_EXIT"
              adb logcat -d | grep -iE "(INSTALL|PackageManager)" | tail -30
              exit 1
            fi

            echo "::notice::Installation succeeded"

            echo "=== Launching app ==="
            adb shell am start -n com.pos.clothingstore/.ui.MainActivity
            sleep 5

            echo "=== Taking screenshot ==="
            adb exec-out screencap -p > /tmp/emulator_screen.png

            echo "=== Checking for crashes ==="
            CRASH=$(adb logcat -d | grep -E "FATAL EXCEPTION|AndroidRuntime" | tail -20)
            if [ -n "$CRASH" ]; then
              echo "::warning::App crashed after launch"
              echo "$CRASH"
            else
              echo "::notice::App running without crashes"
            fi

            echo "=== DONE ==="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: POS-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: emulator-screenshots
          path: /tmp/emulator_screen.png
          retention-days: 14
